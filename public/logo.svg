<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Icono: Microscopio estilizado con elemento de IA -->
  <g transform="translate(10, 8)">
    <!-- Base del microscopio -->
    <rect x="5" y="40" width="30" height="8" rx="2" fill="url(#logoGradient)"/>
    <!-- Brazo del microscopio -->
    <path d="M15 40 L15 25 Q15 20 20 20 L25 20 Q30 20 30 25 L30 30" fill="none" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round"/>
    <!-- Tubo ocular -->
    <rect x="22" y="5" width="8" height="15" rx="1" fill="url(#logoGradient)"/>
    <!-- Ocular -->
    <ellipse cx="26" cy="5" rx="5" ry="2" fill="#06b6d4"/>
    <!-- Platina -->
    <rect x="10" y="32" width="20" height="3" rx="1" fill="#3b82f6"/>
    <!-- Elemento de IA (circuito neural) -->
    <circle cx="38" cy="15" r="4" fill="#10b981" opacity="0.8"/>
    <circle cx="42" cy="10" r="2" fill="#10b981" opacity="0.6"/>
    <circle cx="34" cy="10" r="2" fill="#10b981" opacity="0.6"/>
    <line x1="38" y1="15" x2="42" y2="10" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <line x1="38" y1="15" x2="34" y2="10" stroke="#10b981" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Texto: AI VetLab -->
  <text x="60" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    AI <tspan fill="url(#logoGradient)">Vet</tspan>Lab
  </text>

  <!-- Tagline -->
  <text x="60" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="400" fill="#64748b" letter-spacing="1">
    GESTIÓN DE MUESTRAS BIOLÓGICAS
  </text>
</svg>
